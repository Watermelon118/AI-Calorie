name: Frontend CI

on:
  push:
    branches:
      - main
      - feature
  pull_request:
    branches:
      - main

jobs:
  mobile-app:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: MobileApp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: MobileApp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
